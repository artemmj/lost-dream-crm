  #     - zk_data:/var/lib/zookeeper/data

  # kafka:
  #   image: confluentinc/cp-kafka:7.5.0
  #   depends_on: [zookeeper]
  #   ports: ["9092:9092"]
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
